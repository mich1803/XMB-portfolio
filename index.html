<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMB Portfolio</title>
    <link rel="stylesheet" href="scss/main.css">
    <script defer src="js/script.js"></script>
</head>
<body>
    <audio id="nav" src="audio/nav.mp3" type="audio/mpeg"></audio>
    <video autoplay loop muted playsinline class="back-vid" id="vid" src="images/vid.mp4" type="video/mp4"></video>

    <main id="menu">
        <section class="xmb-main" id="xmb-main"></section>
    </main>

    <div class="mobile-joystick" id="mobile-joystick" aria-label="Mobile navigation controls">
        <button type="button" class="joy-btn joy-up" data-dir="up" aria-label="Move up">▲</button>
        <button type="button" class="joy-btn joy-left" data-dir="left" aria-label="Move left">◀</button>
        <button type="button" class="joy-btn joy-center" data-dir="enter" aria-label="Open selected item">⏎</button>
        <button type="button" class="joy-btn joy-right" data-dir="right" aria-label="Move right">▶</button>
        <button type="button" class="joy-btn joy-down" data-dir="down" aria-label="Move down">▼</button>
    </div>

    <div class="xmb-help-banner" aria-hidden="true">
        <span class="hint-keys">⇦ ⇧ ⇩ ⇨</span> Move
        <span class="hint-sep">|</span>
        <span class="hint-keys">⏎ Enter</span> Open selected item
    </div>
</body>
</html>
